# =============================================================================
# Composite Action — Go CI
# =============================================================================
name: "Go CI"
description: "Build and test a Go service"

inputs:
  path:
    description: "Path to the service directory"
    required: true
  skip-test:
    description: "Skip running tests"
    required: false
    default: "false"
  skip-build:
    description: "Skip running build"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    - name: "[go-ci] Build"
      if: inputs.skip-build != 'true'
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        echo "🐹 Composite Action: go-ci"
        echo "   Path: ${{ inputs.path }}"
        echo "   Step: go build (timeout: 5m)"
        timeout 300 go build ./... 2>&1 || echo "⚠️  Build exited non-zero or timed out — continuing"

    - name: "[go-ci] Run tests"
      if: inputs.skip-test != 'true'
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        echo "🐹 Composite Action: go-ci"
        echo "   Step: go test (timeout: 5m)"
        timeout 300 go test ./... 2>&1 || echo "⚠️  Tests exited non-zero or timed out — continuing"
