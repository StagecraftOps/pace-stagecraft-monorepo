# =============================================================================
# Composite Action — Python CI
# =============================================================================
name: "Python CI"
description: "Install dependencies and test a Python service"

inputs:
  path:
    description: "Path to the service directory"
    required: true
  skip-test:
    description: "Skip running tests"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: "[python-ci] Install dependencies"
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        echo "🐍 Composite Action: python-ci"
        echo "   Path: ${{ inputs.path }}"
        echo "   Step: pip install"
        pip install -r requirements.txt

    - name: "[python-ci] Run tests"
      if: inputs.skip-test != 'true'
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        echo "🐍 Composite Action: python-ci"
        echo "   Step: pytest (timeout: 5m)"
        timeout 300 pytest 2>&1 || echo "⚠️  Tests exited non-zero or timed out — continuing"
