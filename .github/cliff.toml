# =============================================================================
# git-cliff configuration — Conventional Commits changelog generator
# =============================================================================

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
            {% if commit.breaking %} [**BREAKING**]{% endif %} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/zillow/multiservice-monorepo/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat",      group = "🚀 Features"         },
  { message = "^fix",       group = "🐛 Bug Fixes"         },
  { message = "^perf",      group = "⚡ Performance"        },
  { message = "^refactor",  group = "♻️  Refactoring"       },
  { message = "^docs",      group = "📚 Documentation"     },
  { message = "^test",      group = "🧪 Tests"             },
  { message = "^build",     group = "🏗️  Build System"      },
  { message = "^ci",        group = "⚙️  CI/CD"             },
  { message = "^chore",     skip  = true                   },
  { message = "^revert",    group = "⏪ Reverts"            },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
