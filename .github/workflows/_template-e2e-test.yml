name: "Template: Playwright E2E Tests"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      base_url:
        required: true
        type: string
      browser_list:
        required: false
        type: string
        default: "chromium,firefox,webkit"
      test_grep_pattern:
        required: false
        type: string
        default: ""
    secrets:
      E2E_TEST_USER_EMAIL:
        required: false
      E2E_TEST_USER_PASSWORD:
        required: false

jobs:
  e2e-test:
    name: "E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}) — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ inputs.browser_list }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ inputs.browser_list }}

      - name: Run Playwright tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          GREP_ARGS=""
          if [ -n "${{ inputs.test_grep_pattern }}" ]; then
            GREP_ARGS="--grep=${{ inputs.test_grep_pattern }}"
          fi
          npx playwright test \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} \
            --reporter=blob \
            $GREP_ARGS
        env:
          BASE_URL: ${{ inputs.base_url }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          CI: true

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.service_name }}-e2e-blob-${{ matrix.shardIndex }}-${{ github.sha }}
          path: blob-report/
          retention-days: 1

  merge-e2e-reports:
    name: "Merge E2E Reports — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: e2e-test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.service_name }}-e2e-blob-*-${{ github.sha }}
          merge-multiple: true
          path: all-blob-reports

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html,junit ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.service_name }}-e2e-html-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ inputs.service_name }}-e2e-screenshots-${{ github.sha }}
          path: test-results/
          retention-days: 7

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: results.xml
          check_name: "E2E Tests — ${{ inputs.service_name }}"
