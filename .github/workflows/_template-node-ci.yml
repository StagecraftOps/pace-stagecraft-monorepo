name: "Template: Node.js CI"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      working_directory:
        required: true
        type: string
      run_e2e:
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false

jobs:
  node-ci:
    name: "Node CI — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: "https://registry.npmjs.org"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.working_directory }}/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ inputs.node_version }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ inputs.node_version }}-
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Lint (ESLint)
        run: npm run lint -- --format=json --output-file=eslint-results.json || (cat eslint-results.json && exit 1)

      - name: Type check (TypeScript)
        run: npm run type-check

      - name: Unit tests (Jest with coverage)
        run: npm run test -- --coverage --coverageReporters=lcov --coverageReporters=text --ci --runInBand
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working_directory }}/coverage/lcov.info
          flags: ${{ inputs.service_name }}
          fail_ci_if_error: false

      - name: Build (TypeScript / Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service_name }}-build-${{ github.sha }}
          path: ${{ inputs.working_directory }}/dist
          retention-days: 7

      - name: Check bundle size
        if: hashFiles(format('{0}/.bundlesize.config.json', inputs.working_directory)) != ''
        run: npx bundlesize

      - name: Run E2E tests (optional)
        if: inputs.run_e2e
        run: npm run test:e2e
        env:
          NODE_ENV: test
          CI: true
