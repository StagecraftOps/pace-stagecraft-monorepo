name: "Template: Security Scan"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      severity_threshold:
        required: false
        type: string
        default: "HIGH"

jobs:
  security-scan:
    name: "Security Scan - ${{ inputs.service_name }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.working_directory }}
          format: table
          severity: ${{ inputs.severity_threshold }},CRITICAL
          exit-code: "0"

      - name: Generate security scan summary
        if: always()
        run: |
          echo "## Security Scan - ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Severity threshold: ${{ inputs.severity_threshold }}" >> $GITHUB_STEP_SUMMARY
          echo "- Directory scanned: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
