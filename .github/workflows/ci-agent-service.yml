name: "CI — agent-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/agent-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/agent-service/**"
      - "packages/**"

concurrency:
  group: ci-agent-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  SERVICE_DIR: services/backend/agent-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-agent-${{ hashFiles('services/backend/agent-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-agent-

      - name: Download Go modules
        run: cd services/backend/agent-service && go mod download

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: services/backend/agent-service
          args: --timeout 5m --config ../../.golangci.yml

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-agent-${{ hashFiles('services/backend/agent-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-agent-

      - name: Run unit tests with race detector
        run: |
          cd services/backend/agent-service
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 5m ./...

      - name: Assert 80% coverage threshold
        run: |
          cd services/backend/agent-service
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          awk "BEGIN{exit ($COVERAGE < 80)}"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-service-coverage
          path: services/backend/agent-service/coverage.out

  license-validation-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-agent-${{ hashFiles('services/backend/agent-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-agent-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Go license validation unit tests
        run: |
          cd services/backend/agent-service
          go test -run TestLicenseValidation ./internal/license/... -v -count=1

      - name: Run 50-state license API integration tests with mocked HTTP fixtures
        run: |
          python scripts/test_state_license_api_integration.py --mock

      - uses: actions/upload-artifact@v4
        with:
          name: agent-license-validation-results
          path: agent-license-test-results.xml

  security-scan:
    needs: lint
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: agent-service
      working_directory: services/backend/agent-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, license-validation-test]
    uses: ./.github/workflows/_template-go-ci.yml
    with:
      service_name: agent-service
      go_version: "1.22"
      working_directory: services/backend/agent-service
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: agent-service
      dockerfile_path: services/backend/agent-service/Dockerfile
      ecr_repository: stagecraft/agent-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: agent-service
      test_suite: agent-matching
      environment_url: http://localhost:8022
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: agent-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/agent-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
