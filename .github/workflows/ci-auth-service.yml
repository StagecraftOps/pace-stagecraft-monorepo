name: "CI — auth-service"

on:
  push:
    paths:
      - 'services/auth/auth-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/auth-service/**'
      - 'packages/**'

concurrency:
  group: ci-auth-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/auth-service
  PYTHON_VERSION: '3.11'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    outputs:
      lint_result: ${{ steps.lint.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: auth-service-${{ hashFiles('services/auth/auth-service/requirements*.txt') }}
          restore-keys: auth-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        id: lint
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          ruff check . --output-format=github
          echo "result=passed" >> "$GITHUB_OUTPUT"

      - name: Run mypy type checker
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy app/ --ignore-missing-imports --strict

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: auth-service-${{ hashFiles('services/auth/auth-service/requirements*.txt') }}
          restore-keys: auth-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=88 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ${{ env.SERVICE_DIR }}/coverage.xml
          flags: auth-service
          token: ${{ secrets.CODECOV_TOKEN }}

  security-scan:
    name: Security Scan
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: auth-service
      working_directory: services/auth/auth-service
      severity_threshold: HIGH
    secrets: inherit

  build-docker:
    name: Build Docker Image
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: auth-service
      dockerfile_path: services/auth/auth-service/Dockerfile
      ecr_repository: stagecraft/auth-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: build-docker
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: auth-service
      test_suite: integration
      environment_url: http://localhost:8001
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: auth-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/auth-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit

  notify:
    name: Notify Slack
    needs: deploy-staging
    if: always() && github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      service_name: auth-service
      environment: staging
      status: ${{ needs.deploy-staging.result }}
      image_tag: ${{ github.sha }}
      triggered_by: ${{ github.actor }}
    secrets: inherit
