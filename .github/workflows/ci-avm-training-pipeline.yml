name: CI - AVM Training Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "services/data/avm-training-pipeline/**"
      - ".github/workflows/ci-avm-training-pipeline.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/data/avm-training-pipeline/**"
      - ".github/workflows/ci-avm-training-pipeline.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  SERVICE_DIR: services/data/avm-training-pipeline
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: avm-training-pipeline
  MODEL_ARTIFACT_BUCKET: ${{ secrets.AVM_MODEL_ARTIFACT_BUCKET }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/data/avm-training-pipeline/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint tools
        run: pip install flake8 black isort mypy

      - name: Run flake8
        working-directory: ${{ env.SERVICE_DIR }}
        run: flake8 src/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Check black formatting
        working-directory: ${{ env.SERVICE_DIR }}
        run: black --check src/

      - name: Check import ordering
        working-directory: ${{ env.SERVICE_DIR }}
        run: isort --check-only --diff src/

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/data/avm-training-pipeline/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with 75% coverage threshold
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          ENVIRONMENT: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: avm-coverage
          path: ${{ env.SERVICE_DIR }}/coverage.xml

  data-validation:
    name: Training Data Integrity Validation
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install validation dependencies
        run: pip install pandas great-expectations awscli boto3

      - name: Validate training data schema
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python scripts/validate_training_data.py --config data_validation_config.yml

      - name: Check for data drift in feature distributions
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python scripts/check_feature_drift.py --baseline-path s3://${{ env.MODEL_ARTIFACT_BUCKET }}/baselines/

  model-training:
    name: Train AVM Model
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/data/avm-training-pipeline/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install ML dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -r requirements.txt

      - name: Run model training script
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          EXPERIMENT_NAME: avm-ci-${{ github.run_id }}
        run: |
          python scripts/train_model.py \
            --config config/training_config.yml \
            --output-dir /tmp/model_artifacts \
            --run-id ${{ github.run_id }}

      - name: Upload model artifact to S3
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp /tmp/model_artifacts/ \
            s3://${{ env.MODEL_ARTIFACT_BUCKET }}/ci/${{ github.sha }}/ \
            --recursive

      - name: Upload model artifact
        uses: actions/upload-artifact@v7
        with:
          name: avm-model-artifact
          path: /tmp/model_artifacts/

  model-evaluation:
    name: Model Quality Gate
    runs-on: ubuntu-latest
    needs: model-training
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: avm-model-artifact
          path: /tmp/model_artifacts/

      - name: Install evaluation dependencies
        run: pip install scikit-learn pandas numpy boto3

      - name: Evaluate model metrics
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          MIN_R2_SCORE: "0.85"
          MAX_MAPE: "0.08"
        run: |
          python scripts/evaluate_model.py \
            --model-dir /tmp/model_artifacts/ \
            --min-r2 ${{ env.MIN_R2_SCORE }} \
            --max-mape ${{ env.MAX_MAPE }} \
            --test-data-path s3://${{ env.MODEL_ARTIFACT_BUCKET }}/test-data/latest.parquet

  docker-build:
    name: Docker Build
    needs: model-evaluation
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: avm-training-pipeline
      ecr_repository: avm-training-pipeline
      dockerfile_path: services/data/avm-training-pipeline/Dockerfile
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  notify:
    name: Notify Slack
    needs: [model-evaluation, docker-build]
    if: always()
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      service_name: avm-training-pipeline
      environment: staging
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      triggered_by: ${{ github.actor }}
    secrets: inherit
