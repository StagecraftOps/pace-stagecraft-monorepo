name: "CI — compliance-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/compliance-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/compliance-service/**"
      - "packages/**"

concurrency:
  group: ci-compliance-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/compliance-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: compliance-${{ hashFiles('services/backend/compliance-service/requirements*.txt') }}
          restore-keys: |
            compliance-pip-

      - name: Install dependencies
        working-directory: services/backend/compliance-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/compliance-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/compliance-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: compliance-${{ hashFiles('services/backend/compliance-service/requirements*.txt') }}
          restore-keys: |
            compliance-pip-

      - name: Install dependencies
        working-directory: services/backend/compliance-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 88% coverage threshold
        working-directory: services/backend/compliance-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=88 -x

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-service-coverage
          path: |
            services/backend/compliance-service/coverage.xml
            services/backend/compliance-service/htmlcov/

  legal-validation:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: compliance-${{ hashFiles('services/backend/compliance-service/requirements*.txt') }}
          restore-keys: |
            compliance-pip-

      - name: Install dependencies
        working-directory: services/backend/compliance-service
        run: pip install -e ".[dev]"

      - name: Run CFPB, Fair Housing, ECOA, and CRA legal tests
        working-directory: services/backend/compliance-service
        run: |
          pytest tests/legal/ -v \
            -m "cfpb or fair_housing or ecoa or cra" \
            --tb=long \
            --junit-xml=legal-validation-results.xml

      - name: Run 100 CFPB examination scenarios against rule engine
        working-directory: services/backend/compliance-service
        run: python scripts/run_cfpb_exam_scenarios.py

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-legal-validation
          path: services/backend/compliance-service/legal-validation-results.xml

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: compliance-service
      working_directory: services/backend/compliance-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, legal-validation]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: compliance-service
      python_version: "3.11"
      working_directory: services/backend/compliance-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: compliance-service
      dockerfile_path: services/backend/compliance-service/Dockerfile
      ecr_repository: stagecraft/compliance-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: compliance-service
      test_suite: compliance-rules
      environment_url: http://localhost:8026
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: [legal-validation, integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: compliance-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/compliance-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
