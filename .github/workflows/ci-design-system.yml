name: "CI — design-system"

on:
  push:
    paths:
      - "services/frontend/design-system/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/design-system/**"
      - "packages/**"

concurrency:
  group: ci-design-system-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-design-system-${{ hashFiles('services/frontend/design-system/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-design-system-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/design-system
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/design-system
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/design-system

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-design-system-${{ hashFiles('services/frontend/design-system/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-design-system-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/design-system
      - name: Run unit tests (200+ components) with coverage
        run: npm test -- --ci --coverage
        working-directory: services/frontend/design-system
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: design-system-coverage
          path: services/frontend/design-system/coverage/

  storybook-build:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-design-system-${{ hashFiles('services/frontend/design-system/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-design-system-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/design-system
      - name: Build Storybook
        run: npm run build-storybook -- --output-dir storybook-static
        working-directory: services/frontend/design-system
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: design-system-storybook
          path: services/frontend/design-system/storybook-static/

  accessibility-audit:
    runs-on: ubuntu-latest
    needs: [storybook-build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Download Storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: design-system-storybook
          path: services/frontend/design-system/storybook-static
      - name: Install axe-core CLI and test runner
        run: npm install -g @axe-core/cli @storybook/test-runner
      - name: Serve Storybook
        run: npx serve services/frontend/design-system/storybook-static -l 6006 &
      - name: Wait for Storybook to be ready
        run: sleep 5
      - name: Run accessibility audit (all stories through axe)
        run: npx storybook-test-runner --url http://localhost:6006 --junit
        env:
          STORYBOOK_JUNIT_OUTPUT_DIR: reports
      - name: Upload JUnit accessibility report
        uses: actions/upload-artifact@v7
        with:
          name: design-system-a11y-junit
          path: reports/

  build-package:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-design-system-${{ hashFiles('services/frontend/design-system/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-design-system-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/design-system
      - name: Build package (compile TS to dist/)
        run: npm run build
        working-directory: services/frontend/design-system
      - name: Pack tarball
        run: npm pack
        working-directory: services/frontend/design-system
      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: design-system-tarball
          path: services/frontend/design-system/design-system-*.tgz

  publish-npm:
    runs-on: ubuntu-latest
    needs: [build-package, accessibility-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://npm.internal
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-design-system-${{ hashFiles('services/frontend/design-system/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-design-system-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/design-system
      - name: Build package
        run: npm run build
        working-directory: services/frontend/design-system
      - name: Publish to internal npm registry
        run: npm publish --registry https://npm.internal
        working-directory: services/frontend/design-system
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_INTERNAL_TOKEN }}
      - name: Log published version
        run: echo "Published $(node -p \"require('./package.json').version\")"
        working-directory: services/frontend/design-system
