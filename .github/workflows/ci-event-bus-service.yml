name: CI - Event Bus Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/infra/event-bus-service/**"
      - ".github/workflows/ci-event-bus-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/infra/event-bus-service/**"
      - ".github/workflows/ci-event-bus-service.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  SERVICE_DIR: services/infra/event-bus-service
  GO_VERSION: "1.22"
  COVERAGE_THRESHOLD: "85"
  KAFKA_VERSION: "7.6.0"

jobs:
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | \
            sh -s -- -b $(go env GOPATH)/bin v1.57.2

      - name: Run golangci-lint
        working-directory: ${{ env.SERVICE_DIR }}
        run: golangci-lint run --timeout 5m ./...

      - name: Run go vet
        working-directory: ${{ env.SERVICE_DIR }}
        run: go vet ./...

  unit-test:
    name: Unit Tests (go test, 85% coverage, race detector)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('services/infra/event-bus-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests with race detector and coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | grep total | awk '{print $3}' | \
            awk -F'%' '{if ($1 < ${{ env.COVERAGE_THRESHOLD }}) {print "Coverage "$1"% below threshold ${{ env.COVERAGE_THRESHOLD }}%"; exit 1} else {print "Coverage "$1"% OK"}}'

      - name: Generate coverage report
        working-directory: ${{ env.SERVICE_DIR }}
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ${{ env.SERVICE_DIR }}/coverage.html

  schema-registry-sync:
    name: Schema Registry Sync Validation
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
      schema-registry:
        image: confluentinc/cp-schema-registry:7.6.0
        ports:
          - 8081:8081
        env:
          SCHEMA_REGISTRY_HOST_NAME: schema-registry
          SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('services/infra/event-bus-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Wait for Kafka and Schema Registry
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8081/subjects > /dev/null; then break; fi
            sleep 5
          done

      - name: Register event schemas in Schema Registry
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          go run ./cmd/schema-register/main.go \
            --registry-url http://localhost:8081 \
            --schemas-dir schemas/ \
            --dry-run false
        env:
          SCHEMA_REGISTRY_URL: http://localhost:8081

      - name: Validate schema compatibility (BACKWARD)
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          go test -v -run TestSchemaCompatibility ./tests/schema/... \
            -args -registry-url=http://localhost:8081 \
                  -compatibility-level=BACKWARD
        env:
          SCHEMA_REGISTRY_URL: http://localhost:8081

      - name: Test dead-letter queue routing
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          go test -v -run TestDLQRouting ./tests/schema/... \
            -args -kafka-brokers=localhost:9092
        env:
          KAFKA_BROKERS: localhost:9092

  docker-build:
    name: Docker Build
    needs: schema-registry-sync
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: event-bus-service
      ecr_repository: event-bus-service
      dockerfile_path: services/infra/event-bus-service/Dockerfile
      image_tag: ${{ github.sha }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: event-bus-service
      test_suite: integration
      test_timeout_minutes: 30
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      service_name: event-bus-service
      environment: staging
      image_tag: ${{ github.sha }}
      cluster_name: staging-cluster
      namespace: infra-staging
    secrets: inherit

  notify:
    name: Notify Slack
    needs: [lint, unit-test, schema-registry-sync, docker-build, integration-test, deploy-staging]
    if: always()
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      service_name: event-bus-service
      environment: staging
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      triggered_by: ${{ github.actor }}
    secrets: inherit
