name: "CI — feature-flag-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/feature-flag-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/feature-flag-service/**"
      - "packages/**"

concurrency:
  group: ci-feature-flag-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  SERVICE_DIR: services/backend/feature-flag-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/backend/feature-flag-service/package-lock.json

      - name: Install dependencies
        working-directory: services/backend/feature-flag-service
        run: npm ci

      - name: Run ESLint
        working-directory: services/backend/feature-flag-service
        run: npx eslint . --ext .js,.ts --format=github

      - name: Run Prettier format check
        working-directory: services/backend/feature-flag-service
        run: npx prettier --check "src/**/*.{ts,js,json}"

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/backend/feature-flag-service/package-lock.json

      - name: Install dependencies
        working-directory: services/backend/feature-flag-service
        run: npm ci

      - name: Run Jest with 88% line coverage threshold
        working-directory: services/backend/feature-flag-service
        run: |
          npx jest --coverage \
            --coverageThreshold='{"global":{"lines":88}}' \
            --coverageReporters=text,lcov \
            --forceExit

      - uses: actions/upload-artifact@v7
        with:
          name: feature-flag-service-coverage
          path: services/backend/feature-flag-service/coverage/

  security-scan:
    needs: lint
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: feature-flag-service
      working_directory: services/backend/feature-flag-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: feature-flag-service
      node_version: "20"
      working_directory: services/backend/feature-flag-service
      run_e2e: false
    secrets: inherit

  docker-build:
    needs: build
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: feature-flag-service
      dockerfile_path: services/backend/feature-flag-service/Dockerfile
      ecr_repository: stagecraft/feature-flag-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/backend/feature-flag-service/package-lock.json

      - name: Install dependencies
        working-directory: services/backend/feature-flag-service
        run: npm ci

      - name: Run integration test suite via reusable template
        uses: ./.github/workflows/_template-integration-test.yml
        with:
          service_name: feature-flag-service
          test_suite: feature-flags
          environment_url: http://localhost:8024
          test_timeout_minutes: 20

      - name: Test all three SDK clients against running service
        working-directory: services/backend/feature-flag-service
        run: npm run test:sdk-clients

  performance-test:
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install k6
        run: npm install -g k6

      - name: Run flag evaluation performance test (500 VUs, 1 minute)
        run: |
          k6 run \
            --vus 500 \
            --duration 1m \
            --summary-export=perf-summary.json \
            services/backend/feature-flag-service/tests/perf/flag-eval.js

      - name: Assert p99 flag evaluation under 1ms
        run: |
          P99=$(jq '.metrics.http_req_duration.values["p(99)"]' perf-summary.json)
          echo "Flag eval p99: ${P99}ms"
          if [ "$(echo "$P99 > 1" | bc -l)" = "1" ]; then
            echo "FAIL: p99 ${P99}ms exceeds 1ms threshold"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: feature-flag-perf-summary
          path: perf-summary.json

  deploy-staging:
    needs: [integration-test, performance-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: feature-flag-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/feature-flag-service
      replicas: 3
      wait_for_rollout: true
    secrets: inherit
