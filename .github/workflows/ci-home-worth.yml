name: "CI — home-worth"

on:
  push:
    paths:
      - "services/frontend/home-worth/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/home-worth/**"
      - "packages/**"

concurrency:
  group: ci-home-worth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-home-worth-${{ hashFiles('services/frontend/home-worth/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-home-worth-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/home-worth
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/home-worth
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/home-worth

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-home-worth-${{ hashFiles('services/frontend/home-worth/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-home-worth-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/home-worth
      - name: TypeScript type check
        run: npm run type-check
        working-directory: services/frontend/home-worth

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-home-worth-${{ hashFiles('services/frontend/home-worth/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-home-worth-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/home-worth
      - name: Run unit tests (Zestimate integration, equity chart, value history)
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"lines":83}}'
        working-directory: services/frontend/home-worth
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: home-worth-coverage
          path: services/frontend/home-worth/coverage/

  build:
    needs: [unit-test]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: home-worth
      node_version: "20"
      working_directory: services/frontend/home-worth
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: home-worth
      base_url: https://staging-homeworth.internal
      browser_list: chromium,firefox
      test_grep_pattern: "equity|home value|comparable|history|improve"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: home-worth
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/home-worth
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
