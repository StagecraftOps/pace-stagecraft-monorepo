name: "CI — homeowner-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/homeowner-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/homeowner-service/**"
      - "packages/**"

concurrency:
  group: ci-homeowner-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/homeowner-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: homeowner-${{ hashFiles('services/backend/homeowner-service/requirements*.txt') }}
          restore-keys: |
            homeowner-pip-

      - name: Install dependencies
        working-directory: services/backend/homeowner-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/homeowner-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/homeowner-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: homeowner-${{ hashFiles('services/backend/homeowner-service/requirements*.txt') }}
          restore-keys: |
            homeowner-pip-

      - name: Install dependencies
        working-directory: services/backend/homeowner-service
        run: pip install -e ".[dev]"

      - name: Run unit tests covering equity calculation, home value tracking, reminders, and contractor recommendations
        working-directory: services/backend/homeowner-service
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=83 \
            -x \
            -k "not integration"

      - uses: actions/upload-artifact@v4
        with:
          name: homeowner-service-coverage
          path: |
            services/backend/homeowner-service/coverage.xml
            services/backend/homeowner-service/htmlcov/

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: homeowner-service
      working_directory: services/backend/homeowner-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: homeowner-service
      python_version: "3.11"
      working_directory: services/backend/homeowner-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: build
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: homeowner-service
      dockerfile_path: services/backend/homeowner-service/Dockerfile
      ecr_repository: stagecraft/homeowner-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: homeowner-service
      test_suite: homeowner
      environment_url: http://localhost:8028
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: homeowner-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/homeowner-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
