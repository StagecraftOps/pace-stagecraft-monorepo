name: "CI — identity-service"

on:
  push:
    paths:
      - 'services/auth/identity-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/identity-service/**'
      - 'packages/**'

concurrency:
  group: ci-identity-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/identity-service
  GO_VERSION: '1.22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    outputs:
      lint_passed: ${{ steps.golangci.outputs.exit-code == '0' && 'true' || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: identity-${{ hashFiles('services/auth/identity-service/go.sum') }}
          restore-keys: identity-go-

      - name: Download Go modules
        working-directory: ${{ env.SERVICE_DIR }}
        run: go mod download

      - name: Run golangci-lint
        id: golangci
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ env.SERVICE_DIR }}
          args: --timeout=5m ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: identity-${{ hashFiles('services/auth/identity-service/go.sum') }}
          restore-keys: identity-go-

      - name: Run tests with race detector and coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          go test \
            -race \
            -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Assert coverage threshold (>80%)
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < 80" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below required 80%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: identity-coverage
          path: ${{ env.SERVICE_DIR }}/coverage.out
          retention-days: 7

  build:
    name: Build
    needs: unit-test
    uses: ./.github/workflows/_template-go-ci.yml
    with:
      service_name: identity-service
      go_version: '1.22'
      working_directory: services/auth/identity-service
    secrets: inherit

  security-scan:
    name: Security Scan
    needs: lint
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: identity-service
      working_directory: services/auth/identity-service
      severity_threshold: HIGH
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: identity-service
      dockerfile_path: services/auth/identity-service/Dockerfile
      ecr_repository: stagecraft/identity-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: identity-service
      test_suite: identity
      environment_url: http://localhost:9001
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: identity-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/identity-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
