name: "CI — image-classification"

on:
  push:
    paths:
      - "services/ml/image-classification/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/image-classification/**"
      - "packages/**"

concurrency:
  group: ci-image-class-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: image-class-${{ hashFiles('services/ml/image-classification/requirements*.txt') }}
          restore-keys: image-class-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/image-classification
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/image-classification
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/image-classification

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: image-class-${{ hashFiles('services/ml/image-classification/requirements*.txt') }}
          restore-keys: image-class-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/image-classification
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=82
        working-directory: services/ml/image-classification
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: image-class-coverage
          path: services/ml/image-classification/coverage.xml

  model-accuracy-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: image-class-${{ hashFiles('services/ml/image-classification/requirements*.txt') }}
          restore-keys: image-class-
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Install ML extras
        run: pip install -e ".[dev]" torch torchvision pillow
        working-directory: services/ml/image-classification
      - name: Evaluate classifier (accuracy > 93%, per-class recall > 88%)
        run: >
          python scripts/evaluate_classifier.py
          --model s3://ml-models-staging/image-classifier/candidate
          --test-images data/fixtures/labeled_images/
          --classes bedroom bathroom kitchen exterior interior living-room
        working-directory: services/ml/image-classification
      - name: Upload classification report
        uses: actions/upload-artifact@v7
        with:
          name: image-class-accuracy-report
          path: services/ml/image-classification/classification_report.json

  label-quality-check:
    runs-on: ubuntu-latest
    needs: [model-accuracy-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: image-class-${{ hashFiles('services/ml/image-classification/requirements*.txt') }}
          restore-keys: image-class-
      - name: Download accuracy report artifact
        uses: actions/download-artifact@v8
        with:
          name: image-class-accuracy-report
          path: services/ml/image-classification/
      - name: Install scikit-learn
        run: pip install -e ".[dev]" scikit-learn
        working-directory: services/ml/image-classification
      - name: Check label quality (flag classes with > 10% FPR)
        run: >
          python scripts/check_label_quality.py
          --metrics classification_report.json
        working-directory: services/ml/image-classification
      - name: Upload label quality report
        uses: actions/upload-artifact@v7
        with:
          name: image-class-label-quality
          path: services/ml/image-classification/label_quality_report.txt

  build:
    needs: [unit-test, model-accuracy-test, label-quality-check]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: image-classification
      python_version: "3.11"
      working_directory: services/ml/image-classification
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [unit-test, model-accuracy-test, label-quality-check]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: image-classification
      dockerfile_path: services/ml/image-classification/Dockerfile
      ecr_repository: stagecraft/image-classification
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  integration-test:
    needs: [docker-build]
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: image-classification
      test_suite: image-classification
      environment_url: https://staging-image-class.internal
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: [integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: image-classification
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/image-classification
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
