name: "CI — kyc-service"

on:
  push:
    paths:
      - 'services/auth/kyc-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/kyc-service/**'
      - 'packages/**'

concurrency:
  group: ci-kyc-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/kyc-service
  PYTHON_VERSION: '3.11'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: kyc-service-${{ hashFiles('services/auth/kyc-service/requirements*.txt') }}
          restore-keys: kyc-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        working-directory: ${{ env.SERVICE_DIR }}
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy app/ --ignore-missing-imports --strict

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: kyc-service-${{ hashFiles('services/auth/kyc-service/requirements*.txt') }}
          restore-keys: kyc-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=87 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.SERVICE_DIR }}/coverage.xml
          flags: kyc-service
          token: ${{ secrets.CODECOV_TOKEN }}

  pii-compliance-check:
    name: PII Compliance Check
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install compliance tooling
        run: pip install ast-grep-cli 2>/dev/null || true

      - name: Scan for unencrypted PII model fields
        run: |
          python scripts/scan-pii-fields.py services/auth/kyc-service/app/ \
            --pii-registry config/pii-field-registry.json \
            --fail-on-violation \
            || python3 - <<'EOF'
          # Fallback inline scanner if script not present
          import ast, os, sys, glob

          PII_FIELDS = {
            'ssn', 'social_security_number', 'tax_id', 'ein',
            'drivers_license', 'passport_number', 'date_of_birth', 'dob',
            'bank_account', 'routing_number', 'credit_card',
            'phone_number', 'email', 'full_name', 'first_name', 'last_name',
          }

          ENCRYPTION_MARKERS = {'EncryptedField', 'encrypted', 'Encrypted', 'PiiField', 'SecureField'}

          violations = []
          for py_file in glob.glob('services/auth/kyc-service/app/**/*.py', recursive=True):
            try:
              with open(py_file) as f:
                tree = ast.parse(f.read())
              for node in ast.walk(tree):
                if isinstance(node, ast.ClassDef):
                  for item in node.body:
                    if isinstance(item, ast.AnnAssign):
                      field_name = getattr(item.target, 'id', '').lower()
                      ann = ast.unparse(item.annotation) if hasattr(ast, 'unparse') else ''
                      if field_name in PII_FIELDS:
                        if not any(m in ann for m in ENCRYPTION_MARKERS):
                          violations.append(f"{py_file}: {node.name}.{field_name} — PII field may be unencrypted (type: {ann})")
            except Exception as e:
              print(f"Warning: could not parse {py_file}: {e}")

          if violations:
            print("::error::Unencrypted PII fields detected:")
            for v in violations:
              print(f"  {v}")
            sys.exit(1)
          print("PII compliance check passed — all PII fields appear properly annotated.")
          EOF

      - name: Echo PII compliance result
        run: echo "PII compliance check passed."

  security-scan:
    name: Security Scan
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: kyc-service
      working_directory: services/auth/kyc-service
      severity_threshold: HIGH
    secrets: inherit

  build-docker:
    name: Build Docker Image
    needs: [pii-compliance-check, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: kyc-service
      dockerfile_path: services/auth/kyc-service/Dockerfile
      ecr_repository: stagecraft/kyc-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests — KYC Verification Flows
    needs: build-docker
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: kyc-service
      test_suite: kyc-verification
      environment_url: http://localhost:8005
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: kyc-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/kyc-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
