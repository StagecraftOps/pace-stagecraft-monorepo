name: CI - Listing ETL Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "services/data/listing-etl/**"
      - ".github/workflows/ci-listing-etl.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/data/listing-etl/**"
      - ".github/workflows/ci-listing-etl.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  SERVICE_DIR: services/data/listing-etl
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: listing-etl

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/data/listing-etl/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install flake8 black isort mypy

      - name: Run flake8
        working-directory: ${{ env.SERVICE_DIR }}
        run: flake8 src/ --max-line-length=120 --extend-ignore=E203

      - name: Check black formatting
        working-directory: ${{ env.SERVICE_DIR }}
        run: black --check src/

      - name: Check import ordering with isort
        working-directory: ${{ env.SERVICE_DIR }}
        run: isort --check-only src/

      - name: Run mypy type checks
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy src/ --ignore-missing-imports

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/data/listing-etl/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: listing-etl-coverage
          path: ${{ env.SERVICE_DIR }}/coverage.xml

  integration-test:
    name: Integration Tests
    needs: unit-test
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_dir: services/data/listing-etl
      python_version: "3.11"
      test_path: tests/integration/
    secrets: inherit

  docker-build:
    name: Docker Build
    needs: integration-test
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_dir: services/data/listing-etl
      image_name: listing-etl
      dockerfile: services/data/listing-etl/Dockerfile
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: listing-etl
      namespace: data-pipeline
      image_tag: ${{ github.sha }}
    secrets: inherit

  security-scan:
    name: Security Scan
    needs: docker-build
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      image_name: listing-etl
      image_tag: ${{ github.sha }}
      severity_threshold: HIGH
    secrets: inherit

  notify:
    name: Notify Slack
    needs: [deploy-staging, security-scan]
    if: always()
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      workflow_name: "Listing ETL CI"
      service_name: listing-etl
      environment: staging
    secrets: inherit
