name: "CI — listing-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/listing-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/listing-service/**"
      - "packages/**"

concurrency:
  group: ci-listing-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  SERVICE_DIR: services/backend/listing-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-listing-${{ hashFiles('services/backend/listing-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-listing-

      - name: Download Go modules
        run: cd services/backend/listing-service && go mod download

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/backend/listing-service
          args: --timeout 5m --config ../../.golangci.yml

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-listing-${{ hashFiles('services/backend/listing-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-listing-

      - name: Run unit tests with race detector
        run: |
          cd services/backend/listing-service
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 5m ./...

      - name: Generate HTML coverage report
        run: |
          cd services/backend/listing-service
          go tool cover -html=coverage.out -o coverage.html

      - name: Assert coverage threshold
        run: |
          cd services/backend/listing-service
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          awk "BEGIN{exit ($COVERAGE < 82)}"

      - uses: actions/upload-artifact@v7
        with:
          name: listing-service-coverage
          path: |
            services/backend/listing-service/coverage.out
            services/backend/listing-service/coverage.html

  race-condition-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-listing-${{ hashFiles('services/backend/listing-service/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-listing-

      - name: Run concurrent/race condition tests
        run: |
          cd services/backend/listing-service
          go test -race -run TestConcurrent ./... -count=3

      - name: Confirm race condition tests passed
        run: echo "Race condition tests passed with -count=3 and -race enabled"

  security-scan:
    needs: lint
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: listing-service
      working_directory: services/backend/listing-service
      severity_threshold: HIGH
    secrets: inherit

  build-docker:
    needs: [unit-test, race-condition-test, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: listing-service
      dockerfile_path: services/backend/listing-service/Dockerfile
      ecr_repository: stagecraft/listing-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: build-docker
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: listing-service
      test_suite: listing-crud
      environment_url: http://localhost:8010
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: listing-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/listing-service
      replicas: 3
      wait_for_rollout: true
    secrets: inherit
