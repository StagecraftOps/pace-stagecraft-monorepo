name: "CI — llm-service"

on:
  push:
    paths:
      - "services/ml/llm-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/llm-service/**"
      - "packages/**"

concurrency:
  group: ci-llm-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: llm-service-${{ hashFiles('services/ml/llm-service/requirements*.txt') }}
          restore-keys: llm-service-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/llm-service
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/llm-service
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/llm-service

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: llm-service-${{ hashFiles('services/ml/llm-service/requirements*.txt') }}
          restore-keys: llm-service-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/llm-service
      - name: Run unit tests (prompt templates, parsing, token counting, rate limiting)
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=85
        working-directory: services/ml/llm-service
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: llm-service-coverage
          path: services/ml/llm-service/coverage.xml

  prompt-injection-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: llm-service-${{ hashFiles('services/ml/llm-service/requirements*.txt') }}
          restore-keys: llm-service-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/llm-service
      - name: Run prompt injection security tests
        run: pytest tests/security/test_prompt_injection.py -v --junit-xml=security-test-results.xml
        working-directory: services/ml/llm-service
      - name: Upload security test results
        uses: actions/upload-artifact@v7
        with:
          name: llm-security-test-results
          path: services/ml/llm-service/security-test-results.xml

  cost-estimation-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: llm-service-${{ hashFiles('services/ml/llm-service/requirements*.txt') }}
          restore-keys: llm-service-
      - name: Install package with tiktoken
        run: pip install -e ".[dev]" tiktoken
        working-directory: services/ml/llm-service
      - name: Run cost estimation tests (token counting, budget limits)
        run: pytest tests/cost/ -v --junit-xml=cost-test-results.xml
        working-directory: services/ml/llm-service
      - name: Upload cost test results
        uses: actions/upload-artifact@v7
        with:
          name: llm-cost-test-results
          path: services/ml/llm-service/cost-test-results.xml

  security-scan:
    needs: [lint-typecheck]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: llm-service
      working_directory: services/ml/llm-service
      severity_threshold: HIGH
    secrets: inherit

  build:
    needs: [unit-test, prompt-injection-test, cost-estimation-test, security-scan]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: llm-service
      python_version: "3.11"
      working_directory: services/ml/llm-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [unit-test, prompt-injection-test, cost-estimation-test, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: llm-service
      dockerfile_path: services/ml/llm-service/Dockerfile
      ecr_repository: stagecraft/llm-service
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  integration-test:
    needs: [docker-build]
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: llm-service
      test_suite: llm-gateway
      environment_url: https://staging-llm.internal
      test_timeout_minutes: 25
    secrets: inherit

  deploy-staging:
    needs: [integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: llm-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/llm-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
