name: "CI — market-trends-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/market-trends-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/market-trends-service/**"
      - "packages/**"

concurrency:
  group: ci-market-trends-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/market-trends-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: market-trends-${{ hashFiles('services/backend/market-trends-service/requirements*.txt') }}
          restore-keys: |
            market-trends-pip-

      - name: Install dependencies
        working-directory: services/backend/market-trends-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/market-trends-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/market-trends-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: market-trends-${{ hashFiles('services/backend/market-trends-service/requirements*.txt') }}
          restore-keys: |
            market-trends-pip-

      - name: Install dependencies
        working-directory: services/backend/market-trends-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 83% coverage threshold
        working-directory: services/backend/market-trends-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=83 -x

      - uses: actions/upload-artifact@v7
        with:
          name: market-trends-coverage
          path: |
            services/backend/market-trends-service/coverage.xml
            services/backend/market-trends-service/htmlcov/

  data-freshness-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: market-trends-${{ hashFiles('services/backend/market-trends-service/requirements*.txt') }}
          restore-keys: |
            market-trends-pip-

      - name: Install dependencies
        working-directory: services/backend/market-trends-service
        run: pip install -e ".[dev]"

      - name: Run market data staleness and alert threshold tests
        working-directory: services/backend/market-trends-service
        run: |
          pytest tests/data_freshness/ -v --tb=short \
            -k "test_market_data_staleness or test_alert_threshold"

      - name: Check market data age does not exceed 24 hours
        working-directory: services/backend/market-trends-service
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python scripts/check_data_age.py --max-age-hours 24

      - uses: actions/upload-artifact@v7
        with:
          name: market-trends-data-freshness
          path: services/backend/market-trends-service/data-freshness-report.json

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: market-trends-service
      working_directory: services/backend/market-trends-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, data-freshness-test]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: market-trends-service
      python_version: "3.11"
      working_directory: services/backend/market-trends-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: market-trends-service
      dockerfile_path: services/backend/market-trends-service/Dockerfile
      ecr_repository: stagecraft/market-trends-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: market-trends-service
      test_suite: market-trends
      environment_url: http://localhost:8018
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: market-trends-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/market-trends-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
