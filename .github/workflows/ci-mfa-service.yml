name: "CI — mfa-service"

on:
  push:
    paths:
      - 'services/auth/mfa-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/mfa-service/**'
      - 'packages/**'

concurrency:
  group: ci-mfa-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/mfa-service
  PYTHON_VERSION: '3.11'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mfa-service-${{ hashFiles('services/auth/mfa-service/requirements*.txt') }}
          restore-keys: mfa-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        working-directory: ${{ env.SERVICE_DIR }}
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy app/ --ignore-missing-imports --strict

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mfa-service-${{ hashFiles('services/auth/mfa-service/requirements*.txt') }}
          restore-keys: mfa-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.SERVICE_DIR }}/coverage.xml
          flags: mfa-service
          token: ${{ secrets.CODECOV_TOKEN }}

  cryptography-audit:
    name: Cryptography & Secrets Audit
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tooling
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install bandit cryptography

      - name: Run Bandit for hardcoded secrets in MFA code
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          bandit -r app/ \
            -t B105,B106,B107,B108 \
            --severity-level medium \
            -f json \
            -o bandit-report.json || true
          python3 - <<'EOF'
          import json, sys
          try:
            with open('bandit-report.json') as f:
              report = json.load(f)
            issues = report.get('results', [])
            highs = [i for i in issues if i.get('issue_severity') in ('HIGH', 'MEDIUM')]
            if highs:
              print(f"::error::Bandit found {len(highs)} hardcoded secret issue(s):")
              for i in highs:
                print(f"  {i['filename']}:{i['line_number']} — {i['issue_text']}")
              sys.exit(1)
            print(f"Bandit: no hardcoded secret issues found ({len(issues)} total checks)")
          except FileNotFoundError:
            print("bandit-report.json not found — bandit may not have run")
          EOF

      - name: Sanity-check cryptography library
        working-directory: ${{ env.SERVICE_DIR }}
        run: python -c "from cryptography.hazmat.primitives import hashes; print('crypto ok:', hashes.SHA256.name)"

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mfa-bandit-report
          path: ${{ env.SERVICE_DIR }}/bandit-report.json
          retention-days: 14

  security-scan:
    name: Security Scan
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: mfa-service
      working_directory: services/auth/mfa-service
      severity_threshold: HIGH
    secrets: inherit

  build-docker:
    name: Build Docker Image
    needs: [cryptography-audit, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: mfa-service
      dockerfile_path: services/auth/mfa-service/Dockerfile
      ecr_repository: stagecraft/mfa-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: build-docker
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: mfa-service
      test_suite: mfa-flows
      environment_url: http://localhost:8002
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: mfa-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/mfa-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
