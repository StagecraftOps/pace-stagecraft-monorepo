name: "CI — mls-sync-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/mls-sync-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/mls-sync-service/**"
      - "packages/**"

concurrency:
  group: ci-mls-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/mls-sync-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: mls-sync-${{ hashFiles('services/backend/mls-sync-service/requirements*.txt') }}
          restore-keys: |
            mls-sync-pip-

      - name: Install dependencies
        working-directory: services/backend/mls-sync-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/mls-sync-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/mls-sync-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: mls-sync-${{ hashFiles('services/backend/mls-sync-service/requirements*.txt') }}
          restore-keys: |
            mls-sync-pip-

      - name: Install dependencies
        working-directory: services/backend/mls-sync-service
        run: pip install -e ".[dev]"

      - name: Run unit tests including RETS/RESO protocol adapter tests
        working-directory: services/backend/mls-sync-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=82 -x -k "not integration"

      - uses: actions/upload-artifact@v7
        with:
          name: mls-sync-coverage
          path: |
            services/backend/mls-sync-service/coverage.xml
            services/backend/mls-sync-service/htmlcov/

  schema-validation:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: mls-sync-${{ hashFiles('services/backend/mls-sync-service/requirements*.txt') }}
          restore-keys: |
            mls-sync-pip-

      - name: Install dependencies with jsonschema
        working-directory: services/backend/mls-sync-service
        run: pip install -e ".[dev]" jsonschema

      - name: Validate MLS transform output against listing-service schema
        working-directory: services/backend/mls-sync-service
        run: |
          python tests/schema/validate_mls_output.py \
            --fixtures tests/fixtures/mls_feeds/ \
            --output-schema schemas/listing_output_v2.json

      - name: Verify backward compatibility with schema v1
        working-directory: services/backend/mls-sync-service
        run: python tests/schema/test_backward_compat.py

      - uses: actions/upload-artifact@v7
        with:
          name: mls-schema-validation-report
          path: services/backend/mls-sync-service/schema-validation-report.json

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: mls-sync-service
      working_directory: services/backend/mls-sync-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, schema-validation]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: mls-sync-service
      python_version: "3.11"
      working_directory: services/backend/mls-sync-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: mls-sync-service
      dockerfile_path: services/backend/mls-sync-service/Dockerfile
      ecr_repository: stagecraft/mls-sync-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: mls-sync-service
      test_suite: mls-ingestion
      environment_url: http://localhost:8014
      test_timeout_minutes: 25
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: mls-sync-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/mls-sync-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
