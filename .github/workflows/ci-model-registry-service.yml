name: "CI — model-registry-service"

on:
  push:
    paths:
      - "services/ml/model-registry-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/model-registry-service/**"
      - "packages/**"

concurrency:
  group: ci-model-registry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: model-registry-${{ hashFiles('services/ml/model-registry-service/requirements*.txt') }}
          restore-keys: model-registry-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/model-registry-service
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/model-registry-service
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/model-registry-service

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: model-registry-${{ hashFiles('services/ml/model-registry-service/requirements*.txt') }}
          restore-keys: model-registry-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/model-registry-service
      - name: Run unit tests (versioning, A/B split, canary, rollback, feature flags)
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=85
        working-directory: services/ml/model-registry-service
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: model-registry-coverage
          path: services/ml/model-registry-service/coverage.xml

  security-scan:
    needs: [lint-typecheck]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: model-registry-service
      working_directory: services/ml/model-registry-service
      severity_threshold: HIGH
    secrets: inherit

  build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: model-registry-service
      python_version: "3.11"
      working_directory: services/ml/model-registry-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: model-registry-service
      dockerfile_path: services/ml/model-registry-service/Dockerfile
      ecr_repository: stagecraft/model-registry-service
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  integration-test:
    needs: [docker-build]
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: model-registry-service
      test_suite: model-registry
      environment_url: https://staging-model-registry.internal
      test_timeout_minutes: 25
    secrets: inherit

  deploy-staging:
    needs: [integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: model-registry-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/model-registry-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
