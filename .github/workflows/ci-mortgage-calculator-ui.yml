name: "CI — mortgage-calculator-ui"

on:
  push:
    paths:
      - "services/frontend/mortgage-calculator-ui/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/mortgage-calculator-ui/**"
      - "packages/**"

concurrency:
  group: ci-mortgage-calc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-mortgage-calc-${{ hashFiles('services/frontend/mortgage-calculator-ui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-mortgage-calc-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/mortgage-calculator-ui

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-mortgage-calc-${{ hashFiles('services/frontend/mortgage-calculator-ui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-mortgage-calc-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/mortgage-calculator-ui
      - name: TypeScript type check
        run: npm run type-check
        working-directory: services/frontend/mortgage-calculator-ui

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-mortgage-calc-${{ hashFiles('services/frontend/mortgage-calculator-ui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-mortgage-calc-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Run unit tests with coverage (financial calculations — 90% threshold)
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"lines":90,"branches":90}}'
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: mortgage-calc-coverage
          path: services/frontend/mortgage-calculator-ui/coverage/

  accuracy-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-mortgage-calc-${{ hashFiles('services/frontend/mortgage-calculator-ui/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-mortgage-calc-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Run accuracy test (1000 scenarios, max $1 error vs reference spreadsheet)
        run: >
          node scripts/accuracy-test.js
          --scenarios tests/fixtures/mortgage_scenarios_1000.json
          --max-dollar-error 1.00
        working-directory: services/frontend/mortgage-calculator-ui
      - name: Upload accuracy test results
        uses: actions/upload-artifact@v7
        with:
          name: mortgage-calc-accuracy
          path: services/frontend/mortgage-calculator-ui/accuracy-results.json

  build:
    needs: [unit-test, accuracy-test]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: mortgage-calculator-ui
      node_version: "20"
      working_directory: services/frontend/mortgage-calculator-ui
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: mortgage-calculator-ui
      base_url: https://staging-mortgage.internal
      browser_list: chromium,firefox
      test_grep_pattern: "calculate|down payment|PMI|ARM|compare"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: mortgage-calculator-ui
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/mortgage-calculator-ui
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
