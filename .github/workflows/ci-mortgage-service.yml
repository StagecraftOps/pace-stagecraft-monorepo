name: "CI — mortgage-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/mortgage-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/mortgage-service/**"
      - "packages/**"

concurrency:
  group: ci-mortgage-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/mortgage-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mortgage-${{ hashFiles('services/backend/mortgage-service/requirements*.txt') }}
          restore-keys: |
            mortgage-pip-

      - name: Install dependencies
        working-directory: services/backend/mortgage-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/mortgage-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/mortgage-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mortgage-${{ hashFiles('services/backend/mortgage-service/requirements*.txt') }}
          restore-keys: |
            mortgage-pip-

      - name: Install dependencies
        working-directory: services/backend/mortgage-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 90% coverage threshold
        working-directory: services/backend/mortgage-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=90 -x

      - name: Run amortization accuracy verification
        working-directory: services/backend/mortgage-service
        run: python tests/run_amortization_accuracy.py

      - uses: actions/upload-artifact@v4
        with:
          name: mortgage-service-coverage
          path: |
            services/backend/mortgage-service/coverage.xml
            services/backend/mortgage-service/htmlcov/

  compliance-check:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mortgage-${{ hashFiles('services/backend/mortgage-service/requirements*.txt') }}
          restore-keys: |
            mortgage-pip-

      - name: Install dependencies
        working-directory: services/backend/mortgage-service
        run: pip install -e ".[dev]"

      - name: Check TILA APR disclosure compliance
        working-directory: services/backend/mortgage-service
        run: python compliance/check_tila_disclosures.py

      - name: Check RESPA Section 8 kickback rules
        working-directory: services/backend/mortgage-service
        run: python compliance/check_respa_requirements.py

      - uses: actions/upload-artifact@v4
        with:
          name: mortgage-compliance-report
          path: services/backend/mortgage-service/compliance-report.txt

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: mortgage-service
      working_directory: services/backend/mortgage-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, compliance-check]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: mortgage-service
      python_version: "3.11"
      working_directory: services/backend/mortgage-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: mortgage-service
      dockerfile_path: services/backend/mortgage-service/Dockerfile
      ecr_repository: stagecraft/mortgage-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: mortgage-service
      test_suite: mortgage-calculations
      environment_url: http://localhost:8012
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: mortgage-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: finance
      helm_chart_path: charts/mortgage-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
