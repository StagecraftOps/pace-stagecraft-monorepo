name: "CI — neighborhood-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/neighborhood-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/neighborhood-service/**"
      - "packages/**"

concurrency:
  group: ci-neighborhood-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/neighborhood-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: neighborhood-${{ hashFiles('services/backend/neighborhood-service/requirements*.txt') }}
          restore-keys: |
            neighborhood-pip-

      - name: Install dependencies
        working-directory: services/backend/neighborhood-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/neighborhood-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/neighborhood-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: neighborhood-${{ hashFiles('services/backend/neighborhood-service/requirements*.txt') }}
          restore-keys: |
            neighborhood-pip-

      - name: Install dependencies
        working-directory: services/backend/neighborhood-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 82% coverage threshold
        working-directory: services/backend/neighborhood-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=82 -x

      - uses: actions/upload-artifact@v7
        with:
          name: neighborhood-service-coverage
          path: |
            services/backend/neighborhood-service/coverage.xml
            services/backend/neighborhood-service/htmlcov/

  geo-validation:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: neighborhood-${{ hashFiles('services/backend/neighborhood-service/requirements*.txt') }}
          restore-keys: |
            neighborhood-pip-

      - name: Install dependencies
        working-directory: services/backend/neighborhood-service
        run: pip install -e ".[dev]"

      - name: Run boundary, polygon, and topology geo tests
        working-directory: services/backend/neighborhood-service
        run: |
          pytest tests/geo/ -v \
            -k "test_boundary or test_polygon or test_topology" \
            --tb=short

      - name: Validate GeoJSON topology and coverage
        working-directory: services/backend/neighborhood-service
        run: |
          python scripts/validate_geojson.py \
            data/neighborhoods/ \
            --check-topology \
            --check-coverage

      - uses: actions/upload-artifact@v7
        with:
          name: neighborhood-geo-validation-report
          path: services/backend/neighborhood-service/geo-validation-report.json

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: neighborhood-service
      working_directory: services/backend/neighborhood-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, geo-validation]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: neighborhood-service
      python_version: "3.11"
      working_directory: services/backend/neighborhood-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: neighborhood-service
      dockerfile_path: services/backend/neighborhood-service/Dockerfile
      ecr_repository: stagecraft/neighborhood-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: neighborhood-service
      test_suite: neighborhood-data
      environment_url: http://localhost:8021
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: neighborhood-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/neighborhood-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
