name: CI - Notification Service

on:
  push:
    branches: [main, develop]
    paths:
    - "services/notification/notification-service/**"
    - ".github/workflows/ci-notification-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
    - "services/notification/notification-service/**"
    - ".github/workflows/ci-notification-service.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  SERVICE_DIR: services/notification/notification-service
  NODE_VERSION: "20"
  IMAGE_NAME: notification-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: services/notification/notification-service/package-lock.json

    - name: Install dependencies
      working-directory: ${{ env.SERVICE_DIR }}
      run: npm ci

    - name: Run ESLint
      working-directory: ${{ env.SERVICE_DIR }}
      run: npm run lint

    - name: Run Prettier check
      working-directory: ${{ env.SERVICE_DIR }}
      run: npm run format:check

    - name: Run TypeScript type check
      working-directory: ${{ env.SERVICE_DIR }}
      run: npm run type-check

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: services/notification/notification-service/package-lock.json

    - name: Install dependencies
      working-directory: ${{ env.SERVICE_DIR }}
      run: npm ci

    - name: Run Jest unit tests
      working-directory: ${{ env.SERVICE_DIR }}
      env:
        NODE_ENV: test
        JEST_JUNIT_OUTPUT_DIR: ./test-results/
      run: |
        npm run test:unit -- \
          --coverage \
          --coverageThreshold='{"global":{"lines":85,"branches":80}}' \
          --ci \
          --reporters=default \
          --reporters=jest-junit

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: notification-service-coverage
        path: |
          ${{ env.SERVICE_DIR }}/coverage/
          ${{ env.SERVICE_DIR }}/test-results/

  integration-test:
    name: Integration Tests
    needs: unit-test
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: notification-service
      test_suite: integration
      test_timeout_minutes: 30
    secrets: inherit

  docker-build:
    name: Docker Build
    needs: integration-test
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: notification-service
      ecr_repository: notification-service
      dockerfile_path: services/notification/notification-service/Dockerfile
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: notification-service
      namespace: notification
      cluster_name: staging-cluster
      image_tag: ${{ github.sha }}
    secrets: inherit

  security-scan:
    name: Security Scan
    needs: docker-build
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: notification-service
      working_directory: services/notification/notification-service
      severity_threshold: HIGH
    secrets: inherit

  notify:
    name: Notify Slack
    needs: [deploy-staging, security-scan]
    if: always()
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      service_name: notification-service
      environment: staging
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      triggered_by: ${{ github.actor }}
    secrets: inherit
