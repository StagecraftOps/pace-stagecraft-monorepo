name: "CI — offer-flow"

on:
  push:
    paths:
      - "services/frontend/offer-flow/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/offer-flow/**"
      - "packages/**"

concurrency:
  group: ci-offer-flow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-offer-flow-${{ hashFiles('services/frontend/offer-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-offer-flow-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/offer-flow
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/offer-flow
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/offer-flow

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-offer-flow-${{ hashFiles('services/frontend/offer-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-offer-flow-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/offer-flow
      - name: TypeScript type check
        run: npm run type-check
        working-directory: services/frontend/offer-flow

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-offer-flow-${{ hashFiles('services/frontend/offer-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-offer-flow-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/offer-flow
      - name: Run unit tests (state machine, validation, offer letter generation)
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"lines":88,"branches":85}}'
        working-directory: services/frontend/offer-flow
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: offer-flow-coverage
          path: services/frontend/offer-flow/coverage/

  security-scan:
    needs: [lint]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: offer-flow
      working_directory: services/frontend/offer-flow
      severity_threshold: HIGH
    secrets: inherit

  build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: offer-flow
      node_version: "20"
      working_directory: services/frontend/offer-flow
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: offer-flow
      base_url: https://staging-offer.internal
      browser_list: chromium,firefox
      test_grep_pattern: "offer|contingency|earnest|e-sign|submit"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: offer-flow
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/offer-flow
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
