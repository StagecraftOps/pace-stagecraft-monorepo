name: "CI — onboarding-flow"

on:
  push:
    paths:
      - "services/frontend/onboarding-flow/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/onboarding-flow/**"
      - "packages/**"

concurrency:
  group: ci-onboarding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-onboarding-${{ hashFiles('services/frontend/onboarding-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-onboarding-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/onboarding-flow
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/onboarding-flow
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/onboarding-flow

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-onboarding-${{ hashFiles('services/frontend/onboarding-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-onboarding-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/onboarding-flow
      - name: TypeScript type check
        run: npm run type-check
        working-directory: services/frontend/onboarding-flow

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-onboarding-${{ hashFiles('services/frontend/onboarding-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-onboarding-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/onboarding-flow
      - name: Run unit tests with coverage
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"lines":85}}'
        working-directory: services/frontend/onboarding-flow
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-flow-coverage
          path: services/frontend/onboarding-flow/coverage/

  analytics-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-onboarding-${{ hashFiles('services/frontend/onboarding-flow/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-onboarding-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/onboarding-flow
      - name: Validate analytics tracking events against schema
        run: >
          node scripts/validate-tracking-events.js src/
          --schema schemas/analytics-events.json
        working-directory: services/frontend/onboarding-flow
      - name: Upload analytics validation report
        uses: actions/upload-artifact@v7
        with:
          name: onboarding-analytics-validation
          path: services/frontend/onboarding-flow/analytics-validation-report.json

  build:
    needs: [unit-test, analytics-test]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: onboarding-flow
      node_version: "20"
      working_directory: services/frontend/onboarding-flow
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: onboarding-flow
      base_url: https://staging-onboarding.internal
      browser_list: chromium,firefox
      test_grep_pattern: "buyer|seller|renter|agent|preferences"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: onboarding-flow
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/onboarding-flow
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
