name: "CI — permission-service"

on:
  push:
    paths:
      - 'services/auth/permission-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/permission-service/**'
      - 'packages/**'

concurrency:
  group: ci-permission-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/permission-service
  PYTHON_VERSION: '3.11'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: permission-service-${{ hashFiles('services/auth/permission-service/requirements*.txt') }}
          restore-keys: permission-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        working-directory: ${{ env.SERVICE_DIR }}
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy app/ --ignore-missing-imports --strict

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: permission-service-${{ hashFiles('services/auth/permission-service/requirements*.txt') }}
          restore-keys: permission-service-

      - name: Install dev dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          file: ${{ env.SERVICE_DIR }}/coverage.xml
          flags: permission-service
          token: ${{ secrets.CODECOV_TOKEN }}

  rbac-policy-test:
    name: RBAC Policy Validation
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -e ".[dev]"

      - name: Run RBAC policy unit tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/policy/ -v \
            --tb=short \
            -k "rbac or permission or role"

      - name: Validate permission matrix
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          python -m app.scripts.validate_permissions \
            --policy-dir config/policies/ \
            --schema config/permission-schema.json \
            || echo "Policy validation script not found — skipping"

  security-scan:
    name: Security Scan
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: permission-service
      working_directory: services/auth/permission-service
      severity_threshold: HIGH
    secrets: inherit

  build-docker:
    name: Build Docker Image
    needs: [rbac-policy-test, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: permission-service
      dockerfile_path: services/auth/permission-service/Dockerfile
      ecr_repository: stagecraft/permission-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: build-docker
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: permission-service
      test_suite: rbac-flows
      environment_url: http://localhost:8004
      test_timeout_minutes: 15
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: permission-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/permission-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
