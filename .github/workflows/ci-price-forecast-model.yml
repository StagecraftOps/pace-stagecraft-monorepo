name: "CI — price-forecast-model"

on:
  push:
    paths:
      - "services/ml/price-forecast-model/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/price-forecast-model/**"
      - "packages/**"

concurrency:
  group: ci-price-forecast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: price-forecast-${{ hashFiles('services/ml/price-forecast-model/requirements*.txt') }}
          restore-keys: price-forecast-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/price-forecast-model
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/price-forecast-model
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/price-forecast-model

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: price-forecast-${{ hashFiles('services/ml/price-forecast-model/requirements*.txt') }}
          restore-keys: price-forecast-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/price-forecast-model
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=82
        working-directory: services/ml/price-forecast-model
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: price-forecast-coverage
          path: services/ml/price-forecast-model/coverage.xml

  backtesting:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: price-forecast-${{ hashFiles('services/ml/price-forecast-model/requirements*.txt') }}
          restore-keys: price-forecast-
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Install forecasting extras
        run: pip install -e ".[dev]" statsforecast neuralprophet
        working-directory: services/ml/price-forecast-model
      - name: Run 12-month rolling backtest (directional accuracy, WAPE per quarter)
        run: >
          python scripts/run_backtesting.py
          --data s3://ml-data/price-history/backtest_12m.parquet
          --output backtest_results.json
        working-directory: services/ml/price-forecast-model
      - name: Check backtest thresholds (directional >= 0.65, WAPE <= 0.12)
        run: >
          python scripts/check_backtest_thresholds.py
          --results backtest_results.json
          --min-directional-accuracy 0.65
          --max-wape 0.12
        working-directory: services/ml/price-forecast-model
      - name: Upload backtest results
        uses: actions/upload-artifact@v7
        with:
          name: price-forecast-backtest
          path: services/ml/price-forecast-model/backtest_results.json

  build:
    needs: [unit-test, backtesting]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: price-forecast-model
      python_version: "3.11"
      working_directory: services/ml/price-forecast-model
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [unit-test, backtesting]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: price-forecast-model
      dockerfile_path: services/ml/price-forecast-model/Dockerfile
      ecr_repository: stagecraft/price-forecast-model
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  integration-test:
    needs: [docker-build]
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: price-forecast-model
      test_suite: price-forecast
      environment_url: https://staging-price-forecast.internal
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: [backtesting, integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: price-forecast-model
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/price-forecast-model
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
