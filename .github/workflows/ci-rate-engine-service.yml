name: "CI — rate-engine-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/rate-engine-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/rate-engine-service/**"
      - "packages/**"

concurrency:
  group: ci-rate-engine-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/rate-engine-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: rate-engine-${{ hashFiles('services/backend/rate-engine-service/requirements*.txt') }}
          restore-keys: |
            rate-engine-pip-

      - name: Install dependencies
        working-directory: services/backend/rate-engine-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/rate-engine-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/rate-engine-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: rate-engine-${{ hashFiles('services/backend/rate-engine-service/requirements*.txt') }}
          restore-keys: |
            rate-engine-pip-

      - name: Install dependencies
        working-directory: services/backend/rate-engine-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 90% coverage threshold
        working-directory: services/backend/rate-engine-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=90 -x

      - uses: actions/upload-artifact@v7
        with:
          name: rate-engine-coverage
          path: |
            services/backend/rate-engine-service/coverage.xml
            services/backend/rate-engine-service/htmlcov/

  accuracy-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: rate-engine-${{ hashFiles('services/backend/rate-engine-service/requirements*.txt') }}
          restore-keys: |
            rate-engine-pip-

      - name: Install dependencies
        working-directory: services/backend/rate-engine-service
        run: pip install -e ".[dev]"

      - name: Run 500 rate scenarios — assert max error under 12.5 basis points
        working-directory: services/backend/rate-engine-service
        run: |
          python tests/accuracy/run_rate_scenarios.py \
            --scenarios tests/fixtures/rate_scenarios_500.json \
            --max-error-bps 12.5

      - uses: actions/upload-artifact@v7
        with:
          name: rate-engine-accuracy-report
          path: services/backend/rate-engine-service/accuracy_report.json

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: rate-engine-service
      working_directory: services/backend/rate-engine-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, accuracy-test]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: rate-engine-service
      python_version: "3.11"
      working_directory: services/backend/rate-engine-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: rate-engine-service
      dockerfile_path: services/backend/rate-engine-service/Dockerfile
      ecr_repository: stagecraft/rate-engine-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: rate-engine-service
      test_suite: rate-pricing
      environment_url: http://localhost:8025
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: [accuracy-test, integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: rate-engine-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/rate-engine-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
