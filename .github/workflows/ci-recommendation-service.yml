name: "CI — recommendation-service"

on:
  push:
    branches: ["**"]
    paths:
      - "services/backend/recommendation-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/backend/recommendation-service/**"
      - "packages/**"

concurrency:
  group: ci-recommendation-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: services/backend/recommendation-service

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: recommendation-${{ hashFiles('services/backend/recommendation-service/requirements*.txt') }}
          restore-keys: |
            recommendation-pip-

      - name: Install dependencies
        working-directory: services/backend/recommendation-service
        run: pip install -e ".[dev]"

      - name: Run ruff linter
        working-directory: services/backend/recommendation-service
        run: ruff check . --output-format=github

      - name: Run mypy type checker
        working-directory: services/backend/recommendation-service
        run: mypy app/ --ignore-missing-imports

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: recommendation-${{ hashFiles('services/backend/recommendation-service/requirements*.txt') }}
          restore-keys: |
            recommendation-pip-

      - name: Install dependencies
        working-directory: services/backend/recommendation-service
        run: pip install -e ".[dev]"

      - name: Run unit tests with 85% coverage threshold
        working-directory: services/backend/recommendation-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=85 -x

      - uses: actions/upload-artifact@v7
        with:
          name: recommendation-service-coverage
          path: |
            services/backend/recommendation-service/coverage.xml
            services/backend/recommendation-service/htmlcov/

  model-validation:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: recommendation-${{ hashFiles('services/backend/recommendation-service/requirements*.txt') }}
          restore-keys: |
            recommendation-pip-

      - name: Install dependencies with ML packages
        working-directory: services/backend/recommendation-service
        run: pip install -e ".[dev]" scipy numpy

      - name: Validate recommendation model NDCG@10
        working-directory: services/backend/recommendation-service
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python scripts/validate_recommendation_model.py \
            --model-path s3://ml-models-prod/recommendation/latest \
            --test-users-fixture tests/fixtures/test_users.json \
            --min-ndcg 0.35

      - uses: actions/upload-artifact@v7
        with:
          name: recommendation-model-metrics
          path: services/backend/recommendation-service/model_metrics.json

  ab-test-check:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: recommendation-${{ hashFiles('services/backend/recommendation-service/requirements*.txt') }}
          restore-keys: |
            recommendation-pip-

      - name: Install dependencies
        working-directory: services/backend/recommendation-service
        run: pip install -e ".[dev]"

      - name: Run A/B test determinism and consistency checks
        working-directory: services/backend/recommendation-service
        run: pytest tests/ab_test/ -v --tb=short --junit-xml=ab-test-results.xml

      - uses: actions/upload-artifact@v7
        with:
          name: recommendation-ab-test-results
          path: services/backend/recommendation-service/ab-test-results.xml

  security-scan:
    needs: lint-typecheck
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: recommendation-service
      working_directory: services/backend/recommendation-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, model-validation, ab-test-check]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: recommendation-service
      python_version: "3.11"
      working_directory: services/backend/recommendation-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [build, security-scan]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: recommendation-service
      dockerfile_path: services/backend/recommendation-service/Dockerfile
      ecr_repository: stagecraft/recommendation-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: recommendation-service
      test_suite: recommendations
      environment_url: http://localhost:8017
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    needs: [model-validation, integration-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: recommendation-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: backend
      helm_chart_path: charts/recommendation-service
      replicas: 3
      wait_for_rollout: true
    secrets: inherit
