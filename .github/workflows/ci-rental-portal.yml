name: "CI — rental-portal"

on:
  push:
    paths:
      - "services/frontend/rental-portal/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/rental-portal/**"
      - "packages/**"

concurrency:
  group: ci-rental-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-rental-portal-${{ hashFiles('services/frontend/rental-portal/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-rental-portal-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/rental-portal
      - name: Lint (ESLint)
        run: npm run lint
        working-directory: services/frontend/rental-portal
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/rental-portal

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-rental-portal-${{ hashFiles('services/frontend/rental-portal/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-rental-portal-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/rental-portal
      - name: TypeScript type check
        run: npm run type-check
        working-directory: services/frontend/rental-portal

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-rental-portal-${{ hashFiles('services/frontend/rental-portal/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-rental-portal-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/rental-portal
      - name: Run unit tests with coverage
        run: npm test -- --ci --coverage --coverageThreshold='{"global":{"lines":82}}'
        working-directory: services/frontend/rental-portal
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rental-portal-coverage
          path: services/frontend/rental-portal/coverage/

  security-scan:
    needs: [lint]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: rental-portal
      working_directory: services/frontend/rental-portal
      severity_threshold: HIGH
    secrets: inherit

  build:
    needs: [unit-test, security-scan]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: rental-portal
      node_version: "20"
      working_directory: services/frontend/rental-portal
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: rental-portal
      base_url: https://staging-rental.internal
      browser_list: chromium,firefox
      test_grep_pattern: "apply|background check|sign lease|schedule"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: rental-portal
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/rental-portal
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
