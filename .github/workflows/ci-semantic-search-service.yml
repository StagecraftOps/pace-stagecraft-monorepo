name: CI - Semantic Search Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/search/semantic-search-service/**"
      - ".github/workflows/ci-semantic-search-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/search/semantic-search-service/**"
      - ".github/workflows/ci-semantic-search-service.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  SERVICE_DIR: services/search/semantic-search-service
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "78"
  MIN_RECALL_AT_10: "0.85"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/search/semantic-search-service/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linting tools
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install flake8 black isort mypy

      - name: Run flake8
        working-directory: ${{ env.SERVICE_DIR }}
        run: flake8 . --max-line-length=120 --exclude=.venv,migrations,model_cache

      - name: Run black check
        working-directory: ${{ env.SERVICE_DIR }}
        run: black --check .

      - name: Run isort check
        working-directory: ${{ env.SERVICE_DIR }}
        run: isort --check-only .

      - name: Run mypy
        working-directory: ${{ env.SERVICE_DIR }}
        run: mypy . --ignore-missing-imports

  unit-test:
    name: Unit Tests (pytest, 78% coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/search/semantic-search-service/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache sentence-transformer models
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('services/search/semantic-search-service/config/models.yml') }}

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          pytest tests/unit \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --junitxml=test-results.xml \
            -v
        env:
          USE_MOCK_EMBEDDINGS: "true"
          PINECONE_API_KEY: ${{ secrets.PINECONE_TEST_API_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: ${{ env.SERVICE_DIR }}/test-results.xml

  embedding-quality-check:
    name: Embedding Quality Check (recall@10 >= 0.85)
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/search/semantic-search-service/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache embedding models
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('services/search/semantic-search-service/config/models.yml') }}

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run cosine similarity evaluation on test query set
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          python scripts/embedding_quality_eval.py \
            --test-queries tests/fixtures/query_eval_set.jsonl \
            --ground-truth tests/fixtures/ground_truth.jsonl \
            --min-recall-at-10 ${{ env.MIN_RECALL_AT_10 }} \
            --output-report quality-report.json
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_TEST_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_TEST_ENVIRONMENT }}
          EMBEDDING_MODEL: text-embedding-3-small

      - name: Validate minimum cosine similarity threshold
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          python scripts/validate_similarity_scores.py \
            --report quality-report.json \
            --min-avg-cosine 0.72 \
            --fail-on-regression

      - name: Upload quality report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: embedding-quality-report
          path: ${{ env.SERVICE_DIR }}/quality-report.json

  docker-build:
    name: Docker Build
    needs: embedding-quality-check
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: semantic-search-service
      ecr_repository: semantic-search-service
      dockerfile_path: services/search/semantic-search-service/Dockerfile
      image_tag: ${{ github.sha }}
    secrets: inherit

  integration-test:
    name: Integration Tests
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: semantic-search-service
      test_suite: integration
      test_timeout_minutes: 30
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      service_name: semantic-search-service
      environment: staging
      image_tag: ${{ github.sha }}
      cluster_name: staging-cluster
      namespace: search-staging
    secrets: inherit

  notify:
    name: Notify Slack
    needs: [lint, unit-test, embedding-quality-check, docker-build, integration-test, deploy-staging]
    if: always()
    uses: ./.github/workflows/_template-notify-slack.yml
    with:
      service_name: semantic-search-service
      environment: staging
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      triggered_by: ${{ github.actor }}
    secrets: inherit
