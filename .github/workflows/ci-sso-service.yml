name: "CI — sso-service"

on:
  push:
    paths:
      - 'services/auth/sso-service/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'services/auth/sso-service/**'
      - 'packages/**'

concurrency:
  group: ci-sso-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_DIR: services/auth/sso-service
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: sso-${{ hashFiles('services/auth/sso-service/package-lock.json') }}
          restore-keys: sso-

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run lint

      - name: Check formatting with Prettier
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run format:check

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: sso-${{ hashFiles('services/auth/sso-service/package-lock.json') }}
          restore-keys: sso-

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          npm test -- \
            --coverage \
            --coverageThreshold='{"global":{"lines":85,"branches":80,"functions":85}}' \
            --forceExit \
            --ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: sso-coverage
          path: ${{ env.SERVICE_DIR }}/coverage/
          retention-days: 7

  saml-oidc-validation:
    name: SAML & OIDC Protocol Validation
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Run SAML protocol compliance tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run test:saml || echo "::warning::SAML tests not configured"

      - name: Run OIDC flow tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run test:oidc || echo "::warning::OIDC tests not configured"

      - name: Validate SSO provider configurations
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          node -e "
            const configs = require('./config/sso-providers.json');
            const required = ['clientId', 'issuer', 'authorizationURL', 'tokenURL'];
            let valid = true;
            for (const [name, cfg] of Object.entries(configs)) {
              for (const field of required) {
                if (!cfg[field]) {
                  console.error('FAIL: ' + name + ' missing ' + field);
                  valid = false;
                }
              }
            }
            if (!valid) process.exit(1);
            console.log('All SSO provider configs valid.');
          " || echo "::warning::sso-providers.json not found — skipping config validation"

  security-scan:
    name: Security Scan
    needs: lint
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: sso-service
      working_directory: services/auth/sso-service
      severity_threshold: HIGH
    secrets: inherit

  build:
    name: Build
    needs: [saml-oidc-validation, security-scan]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: sso-service
      node_version: '20'
      working_directory: services/auth/sso-service
      run_e2e: false
    secrets: inherit

  docker-build:
    name: Build Docker Image
    needs: build
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: sso-service
      dockerfile_path: services/auth/sso-service/Dockerfile
      ecr_repository: stagecraft/sso-service
      image_tag: ${{ github.sha }}
      push_image: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
    secrets: inherit

  integration-test:
    name: Integration Tests — SSO Provider Flows
    needs: docker-build
    uses: ./.github/workflows/_template-integration-test.yml
    with:
      service_name: sso-service
      test_suite: sso-provider-flows
      environment_url: http://localhost:8007
      test_timeout_minutes: 20
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    needs: integration-test
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: sso-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: auth
      helm_chart_path: charts/sso-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
