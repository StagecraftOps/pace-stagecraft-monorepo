name: "CI — vector-search-service"

on:
  push:
    paths:
      - "services/ml/vector-search-service/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/vector-search-service/**"
      - "packages/**"

concurrency:
  group: ci-vector-search-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: vector-search-${{ hashFiles('services/ml/vector-search-service/requirements*.txt') }}
          restore-keys: vector-search-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/vector-search-service
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/vector-search-service
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/vector-search-service

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: vector-search-${{ hashFiles('services/ml/vector-search-service/requirements*.txt') }}
          restore-keys: vector-search-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/vector-search-service
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=82
        working-directory: services/ml/vector-search-service
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: vector-search-coverage
          path: services/ml/vector-search-service/coverage.xml

  accuracy-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: vector-search-${{ hashFiles('services/ml/vector-search-service/requirements*.txt') }}
          restore-keys: vector-search-
      - name: Install faiss-cpu
        run: pip install -e ".[dev]" faiss-cpu
        working-directory: services/ml/vector-search-service
      - name: ANN accuracy test (100K index, 1K queries, recall@10 and recall@100)
        run: >
          python scripts/ann_accuracy_test.py
          --index-size 100000
          --query-count 1000
          --k 10
        working-directory: services/ml/vector-search-service
      - name: Check ANN thresholds (recall@10 >= 0.95, recall@100 >= 0.99)
        run: >
          python scripts/check_ann_thresholds.py
          --min-recall10 0.95
          --min-recall100 0.99
        working-directory: services/ml/vector-search-service
      - name: Upload ANN accuracy results
        uses: actions/upload-artifact@v7
        with:
          name: vector-search-ann-accuracy
          path: services/ml/vector-search-service/ann_accuracy_results.json

  performance-test:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: vector-search-${{ hashFiles('services/ml/vector-search-service/requirements*.txt') }}
          restore-keys: vector-search-
      - name: Install faiss-cpu
        run: pip install -e ".[dev]" faiss-cpu
        working-directory: services/ml/vector-search-service
      - name: Latency benchmark (1M vectors, 100 concurrent queries, p99 < 10ms)
        run: >
          python scripts/latency_benchmark.py
          --index-size 1000000
          --concurrent-queries 100
          --duration-s 60
        working-directory: services/ml/vector-search-service
      - name: Upload latency report
        uses: actions/upload-artifact@v7
        with:
          name: vector-search-latency
          path: services/ml/vector-search-service/latency_report.json

  security-scan:
    needs: [lint-typecheck]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: vector-search-service
      working_directory: services/ml/vector-search-service
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [unit-test, accuracy-test, performance-test]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: vector-search-service
      python_version: "3.11"
      working_directory: services/ml/vector-search-service
      run_integration: false
    secrets: inherit

  docker-build:
    needs: [unit-test, accuracy-test, performance-test]
    uses: ./.github/workflows/_template-docker-build.yml
    with:
      service_name: vector-search-service
      dockerfile_path: services/ml/vector-search-service/Dockerfile
      ecr_repository: stagecraft/vector-search-service
      image_tag: ${{ github.sha }}
      push_image: true
    secrets: inherit

  deploy-staging:
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: vector-search-service
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/vector-search-service
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
