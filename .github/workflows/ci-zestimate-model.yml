name: "CI — zestimate-model"

on:
  push:
    paths:
      - "services/ml/zestimate-model/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/ml/zestimate-model/**"
      - "packages/**"

concurrency:
  group: ci-zestimate-model-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: zestimate-model-${{ hashFiles('services/ml/zestimate-model/requirements*.txt') }}
          restore-keys: zestimate-model-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/zestimate-model
      - name: Lint with ruff
        run: ruff check . --output-format=github
        working-directory: services/ml/zestimate-model
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        working-directory: services/ml/zestimate-model

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: zestimate-model-${{ hashFiles('services/ml/zestimate-model/requirements*.txt') }}
          restore-keys: zestimate-model-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/zestimate-model
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=82
        working-directory: services/ml/zestimate-model
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: zestimate-model-coverage
          path: services/ml/zestimate-model/coverage.xml

  data-validation:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: zestimate-model-${{ hashFiles('services/ml/zestimate-model/requirements*.txt') }}
          restore-keys: zestimate-model-
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/zestimate-model
      - name: Validate training data schema (features, nulls, value ranges)
        run: python scripts/validate_training_data_schema.py --config config/data_schema.yaml
        working-directory: services/ml/zestimate-model
      - name: Check temporal integrity (no data leakage)
        run: >
          python scripts/check_temporal_integrity.py
          --data-path data/fixtures/training_sample.parquet
        working-directory: services/ml/zestimate-model
      - name: Upload data validation report
        uses: actions/upload-artifact@v7
        with:
          name: zestimate-data-validation
          path: services/ml/zestimate-model/data-validation-report.json

  model-evaluation:
    runs-on: ubuntu-latest
    needs: [unit-test, data-validation]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: zestimate-model-${{ hashFiles('services/ml/zestimate-model/requirements*.txt') }}
          restore-keys: zestimate-model-
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
        working-directory: services/ml/zestimate-model
      - name: Evaluate model (MAE, MAPE, RMSE, R²)
        run: >
          python scripts/evaluate_model.py
          --model-uri s3://ml-models-staging/zestimate/candidate
          --test-data data/fixtures/holdout_sample.parquet
          --output-path eval_results.json
        working-directory: services/ml/zestimate-model
      - name: Check model thresholds (MAPE <= 5%, R² >= 0.92)
        run: >
          python scripts/check_model_thresholds.py
          --results eval_results.json
          --max-mape 5.0
          --min-r2 0.92
        working-directory: services/ml/zestimate-model
      - name: Upload evaluation results
        uses: actions/upload-artifact@v7
        with:
          name: zestimate-eval-results
          path: services/ml/zestimate-model/eval_results.json

  bias-audit:
    runs-on: ubuntu-latest
    needs: [model-evaluation]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: zestimate-model-${{ hashFiles('services/ml/zestimate-model/requirements*.txt') }}
          restore-keys: zestimate-model-
      - name: Install package with Aequitas
        run: pip install -e ".[dev]" aequitas
        working-directory: services/ml/zestimate-model
      - name: Run Aequitas fairness audit (zip_code, income_bracket)
        run: >
          python scripts/run_bias_audit.py
          --model-uri s3://ml-models-staging/zestimate/candidate
          --protected-attrs zip_code income_bracket
        working-directory: services/ml/zestimate-model
      - name: Check bias thresholds (disparate impact ratio > 0.80)
        run: python scripts/check_bias_thresholds.py
        working-directory: services/ml/zestimate-model
      - name: Upload bias audit report
        uses: actions/upload-artifact@v7
        with:
          name: zestimate-bias-audit
          path: services/ml/zestimate-model/bias-audit-report.html

  security-scan:
    needs: [lint-typecheck]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: zestimate-model
      working_directory: services/ml/zestimate-model
      severity_threshold: MEDIUM
    secrets: inherit

  build:
    needs: [model-evaluation, bias-audit, security-scan]
    uses: ./.github/workflows/_template-python-ci.yml
    with:
      service_name: zestimate-model
      python_version: "3.11"
      working_directory: services/ml/zestimate-model
      run_integration: true
    secrets: inherit

  deploy-staging:
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: zestimate-model
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: ml
      helm_chart_path: charts/zestimate-model
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
