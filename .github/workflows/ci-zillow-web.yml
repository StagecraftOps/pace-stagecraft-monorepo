name: "CI — zillow-web"

on:
  push:
    paths:
      - "services/frontend/zillow-web/**"
      - "packages/**"
  pull_request:
    paths:
      - "services/frontend/zillow-web/**"
      - "packages/**"

concurrency:
  group: ci-zillow-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-zillow-web-${{ hashFiles('services/frontend/zillow-web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-zillow-web-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/zillow-web
      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 0
        working-directory: services/frontend/zillow-web
      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: services/frontend/zillow-web
      - name: Lint styles (Stylelint)
        run: npm run lint:styles -- "**/*.css" "**/*.module.css"
        working-directory: services/frontend/zillow-web

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-zillow-web-${{ hashFiles('services/frontend/zillow-web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-zillow-web-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/zillow-web
      - name: TypeScript type check
        run: npm run type-check -- --noEmit --strict
        working-directory: services/frontend/zillow-web

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-zillow-web-${{ hashFiles('services/frontend/zillow-web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-zillow-web-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/zillow-web
      - name: Run unit tests with coverage
        run: >
          npm test -- --ci --coverage
          --coverageThreshold='{"global":{"lines":80,"branches":75}}'
          --reporters=default --reporters=jest-junit
        working-directory: services/frontend/zillow-web
        env:
          JEST_JUNIT_OUTPUT_DIR: reports
          JEST_JUNIT_OUTPUT_NAME: jest-junit.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: zillow-web-coverage
          path: services/frontend/zillow-web/coverage/
      - name: Upload Jest JUnit report
        uses: actions/upload-artifact@v4
        with:
          name: zillow-web-jest-junit
          path: services/frontend/zillow-web/reports/jest-junit.xml

  accessibility-test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-zillow-web-${{ hashFiles('services/frontend/zillow-web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-zillow-web-
      - name: Install dependencies
        run: npm ci
        working-directory: services/frontend/zillow-web
      - name: Build Storybook
        run: npm run build:storybook
        working-directory: services/frontend/zillow-web
      - name: Run a11y checks (axe-storybook)
        run: >
          npx axe-storybook
          --storybook-url file://$(pwd)/services/frontend/zillow-web/storybook-static
          --exit-zero-on-error
          --output-dir services/frontend/zillow-web/a11y-results
      - name: Upload a11y results
        uses: actions/upload-artifact@v4
        with:
          name: zillow-web-a11y-results
          path: services/frontend/zillow-web/a11y-results/

  security-scan:
    needs: [lint]
    uses: ./.github/workflows/_template-security-scan.yml
    with:
      service_name: zillow-web
      working_directory: services/frontend/zillow-web
      severity_threshold: HIGH
    secrets: inherit

  build:
    needs: [unit-test, accessibility-test, security-scan]
    uses: ./.github/workflows/_template-node-ci.yml
    with:
      service_name: zillow-web
      node_version: "20"
      working_directory: services/frontend/zillow-web
      run_e2e: false
    secrets: inherit

  e2e-test:
    needs: [build]
    uses: ./.github/workflows/_template-e2e-test.yml
    with:
      service_name: zillow-web
      base_url: https://staging.zillow-web.internal
      browser_list: chromium,firefox
      test_grep_pattern: "search|property detail|contact agent"
    secrets: inherit

  deploy-staging:
    needs: [e2e-test]
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/_template-deploy-k8s.yml
    with:
      environment: staging
      service_name: zillow-web
      image_tag: ${{ github.sha }}
      cluster_name: staging-eks
      namespace: frontend
      helm_chart_path: charts/zillow-web
      replicas: 2
      wait_for_rollout: true
    secrets: inherit
