name: Trivy Security Scan

# Trivy scans the repo for vulnerable dependencies / misconfigurations and uploads
# the results as SARIF to GitHub code scanning. GitHub then raises code_scanning_alert
# events, which StageCraft's webhook forwards to the Vulnerability RCA agent for
# root-cause analysis, application-context severity escalation and issue tracking.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/trivy-security-scan.yml"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
